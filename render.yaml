databases:
  - name: nifty-postgres
    plan: starter
    databaseName: nifty_management

services:
  # Redis
  - type: redis
    name: nifty-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []  # Allow access from all Render services (internal only)

  # Django API
  - type: web
    name: nifty-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: nifty-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nifty-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: nifty-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: nifty-redis
          type: redis
          property: connectionString

  # Celery Worker
  - type: worker
    name: nifty-celery-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l info
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nifty-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: nifty-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: nifty-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: nifty-redis
          type: redis
          property: connectionString

  # Celery Beat (Scheduler)
  - type: worker
    name: nifty-celery-beat
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config beat -l info
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          name: nifty-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: nifty-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: nifty-redis
          type: redis
          property: connectionString
